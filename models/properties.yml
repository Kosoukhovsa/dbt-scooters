version: 2

sources:
  - name: "scooters_raw"
    description: "Raw data provided by scooters service"
    loader: "https://t.me/inzhenerka_dbt_bot"
    tables:
      - name: "trips"
        description: "Scooter trips"

      - name: "users"
        description: "Users of scooter service"

models:
  - name: trips_prep
    description: "View for trips"
    config:
      materialized: view  
  - name: trips_stat
    description: "HIGH aggregated statistics for trips"  
  
  - name: trips_stat_daily
    description: "Daily aggregated statistics for trips" 
    config:
      indexes:
        - columns: ["date"] 

  - name: trips_age_daily
    description: "Daily and age aggregated statistics for trips" 

  - name: trips_age_daily_stat
    description: "Age aggregated statistics for trips" 


    
